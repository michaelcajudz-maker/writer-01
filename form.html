<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Patient Form</title><style>body{font-family:system-ui,sans-serif;margin:20px;background:#f5f7fb;color:#333}#container{max-width:700px;background:#fff;padding:25px;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.1);margin:0 auto}h2{margin-top:0;margin-bottom:20px;border-bottom:2px solid #edf2f7;padding-bottom:10px}.f-group{margin-bottom:15px;display:flex;flex-direction:column}.f-group label{font-weight:600;margin-bottom:5px;color:#4a5568}.f-group label span{color:#e53e3e}input,select{padding:10px;border:1px solid #cbd5e1;border-radius:6px;font-size:14px}input:disabled{background:#edf2f7;color:#718096;cursor:not-allowed}table{width:100%;border-collapse:collapse;margin-top:10px;margin-bottom:10px}th,td{padding:8px;border:1px solid #cbd5e1;text-align:left}th{background:#edf2f7;font-size:13px}button{font-size:17px;cursor:pointer;padding:6px 12px;border-radius:6px;border:none}#btnSave{background:#3182ce;color:#fff;width:100%;padding:12px;font-size:16px;font-weight:600;margin-top:20px;border-radius:6px}#btnSave:hover{background:#2b6cb0}.t-btn{background:none;padding:2px 6px}.t-btn:hover{background:#e2e8f0}</style></head><body><div id="container"><h2 id="title">Add Patient Record</h2><form id="pForm"><div id="fields"></div><button type="submit" id="btnSave">💾 Save Record</button></form></div><script>const KEY="abke_patient_records",SCHEMA={patient_id:{display:"Patient Record ID",type:"text",editable:!1},created_date:{display:"Created Date",type:"datetime",editable:!1},last_modified:{display:"Last Modified Date",type:"datetime",editable:!1},is_archived:{display:"Is Archived",type:"boolean",editable:!1},first_name:{display:"First Name",type:"text",required:!0,value:""},middle_name:{display:"Middle Name",type:"text",required:!1,value:""},last_name:{display:"Last Name",type:"text",required:!0,value:""},contact_numbers:{display:"Contact Numbers",type:"text",required:!0,value:""},address:{display:"Full Address",type:"text",required:!1,value:""},birthday:{display:"Birthday",type:"date",required:!1,value:""},civil_status:{display:"Civil status",type:"text",required:!1,value:""},chief_complaint:{display:"Chief Complaint",type:"text",required:!1,value:""},biting_animal:{display:"Biting Animal",type:"text",required:!1,value:""},diagnosis:{display:"Diagnosis",type:"text",required:!1,value:""},category:{display:"Category",type:"text",required:!1,value:""},administrations:{display:"Administrations",type:"editable-table",required:!1,value:[{consult_date:{display:"Consultation Date",type:"date",required:!1,value:""},schedule_date:{display:"Scheduled Date",type:"date",required:!1,value:""},date_given:{display:"Date Given",type:"date",required:!1,value:""},injected:{display:"Injected liquid",type:"text",required:!1,value:""}}]}},urlParams=new URLSearchParams(window.location.search),pid=urlParams.get("id");let records=[],record=null,isEdit=!1;try{records=JSON.parse(localStorage.getItem(KEY))||[]}catch(e){}if(pid){const existing=records.find(r=>r.patient_id?.value===pid);if(existing){record=JSON.parse(JSON.stringify(existing));isEdit=!0;document.getElementById("title").textContent="Edit Patient Record"}}if(!record){record=JSON.parse(JSON.stringify(SCHEMA));record.patient_id.value=Array.from({length:7},()=>"ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789"[Math.floor(36*Math.random())]).join("");const now=new Date().toISOString();record.created_date.value=now;record.last_modified.value=now;record.is_archived.value=!1}function renderForm(){const target=document.getElementById("fields");target.innerHTML="";Object.keys(record).forEach(k=>{const f=record[k];if(f.editable===!1&&!isEdit)return;const div=document.createElement("div");div.className="f-group";const lbl=document.createElement("label");lbl.innerHTML=`${f.display}${f.required?' <span>*</span>':''}`;div.append(lbl);if(f.type==="editable-table"){const tblContainer=document.createElement("div");renderTable(tblContainer,f);div.append(tblContainer)}else if(f.type==="boolean"){const sel=document.createElement("select");sel.id=`f_${k}`;sel.disabled=f.editable===!1;sel.innerHTML=`<option value="false" ${f.value===!1?'selected':''}>False</option><option value="true" ${f.value===!0?'selected':''}>True</option>`;div.append(sel)}else{const inp=document.createElement("input");inp.id=`f_${k}`;inp.type=f.type==="datetime"?"datetime-local":f.type;inp.value=f.value||"";if(f.type==="datetime"&&f.value)inp.value=f.value.slice(0,16);inp.required=!!f.required;inp.disabled=f.editable===!1;div.append(inp)}target.append(div)})}function renderTable(container,f){container.innerHTML="";const tbl=document.createElement("table"),thead=document.createElement("thead"),trH=document.createElement("tr");if(!f.value||f.value.length===0)f.value=[JSON.parse(JSON.stringify(SCHEMA.administrations.value[0]))];const cols=Object.keys(f.value[0]);cols.forEach(ck=>{const th=document.createElement("th");th.textContent=f.value[0][ck].display;trH.append(th)});const thAct=document.createElement("th");thAct.textContent="⚙️";trH.append(thAct);thead.append(trH);tbl.append(thead);const tbody=document.createElement("tbody");f.value.forEach((row,rIdx)=>{const tr=document.createElement("tr");cols.forEach(ck=>{const td=document.createElement("td"),col=row[ck],inp=document.createElement("input");inp.type=col.type;inp.value=col.value||"";inp.onchange=e=>{col.value=e.target.value};td.append(inp);tr.append(td)});const tdAct=document.createElement("td"),btnDel=document.createElement("button");btnDel.type="button";btnDel.className="t-btn";btnDel.textContent="❌";btnDel.title="Remove Row";btnDel.onclick=()=>{f.value.splice(rIdx,1);renderTable(container,f)};tdAct.append(btnDel);tr.append(tdAct);tbody.append(tr)});tbl.append(tbody);container.append(tbl);const btnAdd=document.createElement("button");btnAdd.type="button";btnAdd.className="t-btn";btnAdd.textContent="➕ Add Row";btnAdd.onclick=()=>{const template=JSON.parse(JSON.stringify(SCHEMA.administrations.value[0]));Object.keys(template).forEach(k=>template[k].value="");f.value.push(template);renderTable(container,f)};container.append(btnAdd)}document.getElementById("pForm").onsubmit=e=>{e.preventDefault();Object.keys(record).forEach(k=>{const f=record[k];if(f.type==="editable-table")return;const el=document.getElementById(`f_${k}`);if(!el)return;if(f.type==="boolean")f.value=el.value==="true";else if(f.type==="datetime"){if(f.editable===!1)return;f.value=el.value?new Date(el.value).toISOString():""}else f.value=el.value});record.last_modified.value=new Date().toISOString();if(isEdit){const idx=records.findIndex(r=>r.patient_id.value===pid);if(idx>-1)records[idx]=record}else records.push(record);localStorage.setItem(KEY,JSON.stringify(records));alert("Record saved successfully!");window.close()};window.onload=renderForm;</script></body></html>
