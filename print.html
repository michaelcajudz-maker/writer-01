<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Print Record</title><style>body{font-family:system-ui,sans-serif;margin:0;padding:0;background:#666}.print-page{background:#fff;width:10cm;min-height:13cm;box-sizing:border-box;padding:10px;margin:20px auto;box-shadow:0 0 10px rgba(0,0,0,.5);font-size:11px;line-height:1.3;position:relative}#header-info{font-size:8px;text-align:center;border-bottom:1px dashed #000;padding-bottom:5px;margin-bottom:8px;font-weight:700}.title{font-size:13px;font-weight:700;text-align:center;margin:5px 0 10px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:4px;margin-bottom:8px}.f-item{margin-bottom:2px}.f-lbl{font-weight:700;color:#222}.f-val{border-bottom:1px dotted #ccc;padding-left:2px;display:inline-block;width:100%;box-sizing:border-box;word-break:break-all}table{width:100%;border-collapse:collapse;margin-top:8px;font-size:9px}th,td{border:1px solid #000;padding:3px;text-align:left}th{background:#f0f0f0;font-weight:700}@media print{body{background:none;margin:0;padding:0}.print-page{width:10cm;height:13cm;margin:0;box-shadow:none;page-break-inside:avoid}}</style></head><body><div class="print-page"><div id="header-info">ABKE Animal Bite Center - Potol, Kawit, Cavite +639537834711</div><div class="title">PATIENT MEDICAL RECORD</div><div id="meta" class="grid"></div><div id="details" class="grid"></div><div id="tables"></div></div><script>const KEY="abke_patient_records",urlParams=new URLSearchParams(window.location.search),pid=urlParams.get("id");let records=[];try{records=JSON.parse(localStorage.getItem(KEY))||[]}catch(e){}const r=records.find(item=>item.patient_id?.value===pid);if(!r)document.body.innerHTML="<div style='color:#fff;text-align:center;margin-top:5px;'>Record not found.</div>";else{const mDiv=document.getElementById("meta"),dDiv=document.getElementById("details"),tDiv=document.getElementById("tables");Object.keys(r).forEach(k=>{const f=r[k];if(f.type==="editable-table"){if(!f.value||f.value.length===0)return;const div=document.createElement("div"),lbl=document.createElement("div");lbl.className="f-lbl";lbl.textContent=`${f.display}:`;div.append(lbl);const tbl=document.createElement("table"),thead=document.createElement("thead"),trH=document.createElement("tr"),cols=Object.keys(f.value[0]);cols.forEach(ck=>{const th=document.createElement("th");th.textContent=f.value[0][ck].display;trH.append(th)});thead.append(trH);tbl.append(thead);const tbody=document.createElement("tbody");f.value.forEach(row=>{const tr=document.createElement("tr");cols.forEach(ck=>{const td=document.createElement("td");td.textContent=row[ck].value||"";tr.append(td)});tbody.append(tr)});tbl.append(tbody);div.append(tbl);tDiv.append(div)}else{const item=document.createElement("div");item.className="f-item";let valText=f.value!==undefined?f.value:"";if(f.type==="datetime"&&f.value)valText=new Date(f.value).toLocaleString();if(f.type==="boolean")valText=f.value?"True":"False";item.innerHTML=`<span class="f-lbl">${f.display}:</span><div class="f-val">${valText}</div>`;if(["patient_id","created_date","last_modified","is_archived"].includes(k))mDiv.append(item);else dDiv.append(item)}});window.print()}</script></body></html>
