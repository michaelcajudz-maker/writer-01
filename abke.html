<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Patients</title><style>body{font-family:system-ui,sans-serif;margin:20px;background:#f5f7fb;color:#333}h1{margin:0}header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}button{font-size:17px;background:none;border:none;cursor:pointer;padding:5px;border-radius:4px;transition:background .2s}button:hover:not(:disabled){background:#e2e8f0}button:disabled{opacity:.3;cursor:not-allowed}input[type=text]{padding:8px 12px;border:1px solid #cbd5e1;border-radius:6px;width:300px;margin-bottom:15px;font-size:14px}table{width:100%;border-collapse:collapse;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.1);border-radius:8px;overflow:hidden}th,td{padding:12px 15px;text-align:left;border-bottom:1px solid #edf2f7}th{background:#edf2f7;font-weight:600;color:#4a5568}tr.archived{color:#e53e3e;background-color:#fff5f5}tr.archived td{opacity:.8}.actions{text-align:right;white-space:nowrap}.pagination{display:flex;justify-content:center;align-items:center;gap:10px;margin-top:20px}#fileInput{display:none}</style></head><body><header><h1>ABKE Patients</h1><div><button title="Reload" onclick="location.reload()">🔁</button> &nbsp; <button id="btnExport" title="Save records to file">⬆️</button><button id="btnImport" title="Import and merge records from file">📥</button><button id="btnBroom" title="Save to file and CLEAR all records">🧹</button> &nbsp; <button id="btnAdd" title="Add new record">➕</button></div></header><input type="file" id="fileInput" accept=".json"><input type="text" id="search" placeholder="Search required fields..."><div style="overflow-x:auto"><table><thead><tr><th>Patient ID</th><th>First Name</th><th>Last Name</th><th>Contact Numbers</th><th>Status</th><th>Actions</th></tr></thead><tbody id="list"></tbody></table></div><div class="pagination"><button id="btnPrev">◀️</button><span id="pageInfo"></span><button id="btnNext">▶️</button></div><script>const KEY="abke_patient_records";let records=[],filtered=[],page=1,size=10;function load(){try{records=JSON.parse(localStorage.getItem(KEY))||[]}catch(e){records=[]}filterAndRender()}function save(){localStorage.setItem(KEY,JSON.stringify(records));filterAndRender()}function filterAndRender(){const q=document.getElementById("search").value.trim().toLowerCase();filtered=records.filter(r=>{const fName=(r.first_name?.value||"").toLowerCase(),lName=(r.last_name?.value||"").toLowerCase(),cNum=(r.contact_numbers?.value||"").toLowerCase();return fName.includes(q)||lName.includes(q)||cNum.includes(q)});const total=Math.ceil(filtered.length/size)||1;if(page>total)page=total;const start=(page-1)*size,end=start+size,paged=filtered.slice(start,end),tbody=document.getElementById("list");tbody.innerHTML="";paged.forEach(r=>{const tr=document.createElement("tr"),isArch=r.is_archived?.value===true;if(isArch)tr.className="archived";tr.innerHTML=`<td>${r.patient_id?.value||""}</td><td>${r.first_name?.value||""}</td><td>${r.last_name?.value||""}</td><td>${r.contact_numbers?.value||""}</td><td>${isArch?"Archived":"Active"}</td><td class="actions"></td>`;const acts=tr.querySelector(".actions");if(!isArch){const btnEdit=document.createElement("button");btnEdit.title="Edit record";btnEdit.textContent="✏️";btnEdit.onclick=()=>window.open(`form.html?id=${r.patient_id.value}`,"_blank");const btnTrash=document.createElement("button");btnTrash.title="Archive record";btnTrash.textContent="🗑️";btnTrash.onclick=()=>{if(confirm("Are you sure you want to archive this record?")){r.is_archived.value=true;r.last_modified.value=new Date().toISOString();save()}};const btnPrint=document.createElement("button");btnPrint.title="Print record";btnPrint.textContent="🖨️";btnPrint.onclick=()=>window.open(`print.html?id=${r.patient_id.value}`,"_blank");acts.append(btnEdit,btnTrash,btnPrint)}tbody.append(tr)});document.getElementById("pageInfo").textContent=`Page ${page} of ${total}`;document.getElementById("btnPrev").disabled=page===1;document.getElementById("btnNext").disabled=page===total;document.getElementById("btnExport").disabled=records.length===0;document.getElementById("btnBroom").disabled=records.length===0}function triggerExport(){const blob=new Blob([JSON.stringify(records,null,2)],{type:"application/json"}),url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download=`abke_patients_${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(url)}document.getElementById("btnExport").onclick=triggerExport;document.getElementById("btnImport").onclick=()=>document.getElementById("fileInput").click();document.getElementById("fileInput").onchange=e=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=evt=>{try{const incoming=JSON.parse(evt.target.result);if(!Array.isArray(incoming))return alert("Invalid file format.");incoming.forEach(inc=>{if(!inc.patient_id?.value)return;const idx=records.findIndex(r=>r.patient_id.value===inc.patient_id.value);if(idx>-1)records[idx]=inc;else records.push(inc)});save();alert("Records imported and merged successfully!")}catch(err){alert("Error parsing JSON file.")}};reader.readAsText(file);e.target.value=""};document.getElementById("btnBroom").onclick=()=>{if(confirm("STARTING OVER : This will save to file, but then clears all IN-MEMORY records. Continue?")){triggerExport();records=[];save()}};document.getElementById("btnAdd").onclick=()=>window.open("form.html","_blank");document.getElementById("search").oninput=()=>{page=1;filterAndRender()};document.getElementById("btnPrev").onclick=()=>{if(page>1){page--;filterAndRender()}};document.getElementById("btnNext").onclick=()=>{if(page<Math.ceil(filtered.length/size)){page++;filterAndRender()}};window.onload=load;</script></body></html>
